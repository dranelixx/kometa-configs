######################################################
#             Show Chart Collections                 #
######################################################
templates:
  Chart:
    sort_title: +1_<<num>><<collection_name>>
    sync_mode: sync
    smart_label: random
collections:
  Plex Popular:
    template: { name: Chart, num: 1 }
    tautulli_popular:
      list_days: 30
      list_size: 20
      list_buffer: 20
    tautulli_watched:
      list_days: 30
      list_size: 20
      list_buffer: 20
    summary: Shows Popular on Plex
  Trending:
    template: { name: Chart, num: 2 }
    trakt_trending: 10
    tmdb_trending_daily: 10
    tmdb_trending_weekly: 10
    summary: Shows Trending across the internet
  Popular:
    template: { name: Chart, num: 3 }
    tmdb_popular: 40
    imdb_search:
      type: tv_series,tv_mini_series
      sort_by: popularity.asc
      limit: 40
    summary: Popular Shows across the internet
  Top Rated:
    template: { name: Chart, num: 4 }
    imdb_search:
      type: tv_series,tv_mini_series
      sort_by: rating.desc
      votes.gte: 20000
      limit: 100
    tmdb_top_rated: 100
    summary: Top Rated Shows across the internet
  Emmy Winners:
    template: { name: Chart, num: 5 }
    imdb_list: https://www.imdb.com/list/ls066879822/
    summary: Emmy Winning Shows
